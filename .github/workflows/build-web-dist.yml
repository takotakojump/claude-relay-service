name: Build Web Dist

# 在云端构建前端并推送到 web-dist 分支，供部署机 `crs update` 直接下载预构建文件，
# 避免在低内存机器上本地 build。仅构建前端，不做版本号自增 / tag / release / docker。

on:
  push:
    branches:
      - main
    paths:
      - 'web/admin-spa/**'
  workflow_dispatch: # 支持手动触发（首次创建 web-dist 分支用）

permissions:
  contents: write

jobs:
  build-web-dist:
    runs-on: ubuntu-latest
    # 跳过由 GitHub Actions 创建的提交，避免死循环
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/admin-spa/package-lock.json

      - name: Build frontend
        run: |
          echo "Building frontend..."
          cd web/admin-spa
          npm ci
          npm run build
          echo "Frontend build completed"

      - name: Push frontend build to web-dist branch
        run: |
          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 复制构建产物到临时目录
          TEMP_DIR=$(mktemp -d)
          echo "Using temp directory: $TEMP_DIR"
          cp -r web/admin-spa/dist/* "$TEMP_DIR/"

          # 检查 web-dist 分支是否存在
          if git ls-remote --heads origin web-dist | grep -q web-dist; then
            echo "Checking out existing web-dist branch"
            git fetch origin web-dist:web-dist
            git checkout web-dist
          else
            echo "Creating new web-dist branch"
            git checkout --orphan web-dist
          fi

          # 清空当前目录（保留 .git）
          git rm -rf . 2>/dev/null || true

          # 复制构建产物
          cp -r "$TEMP_DIR"/* .

          # 添加说明 README
          cat > README.md << 'EOF'
          # Claude Relay Service - Web Frontend Build (HQ fork)

          This branch contains the pre-built frontend assets for the HQ fork.

          **DO NOT EDIT FILES IN THIS BRANCH DIRECTLY**

          These files are automatically generated by `.github/workflows/build-web-dist.yml`.
          EOF

          # 排除 node_modules 等
          cat > .gitignore << 'EOF'
          node_modules/
          *.log
          .DS_Store
          .env
          EOF

          # 只添加必要的文件，排除 node_modules
          git add --all -- ':!node_modules'
          git commit -m "chore: update frontend build [skip ci]" || echo "No changes to commit"
          git push origin web-dist --force

          # 切换回主分支并清理
          git checkout main
          rm -rf "$TEMP_DIR"

          echo "Frontend build pushed to web-dist branch successfully"
